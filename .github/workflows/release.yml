name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            target: ''
          - platform: windows-latest
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Fix icon.ico for Windows RC compiler
        if: matrix.platform == 'windows-latest'
        shell: python
        run: |
          import struct, io
          from PIL import Image

          def make_bmp_ico(source, dest, sizes=(16, 24, 32, 48, 64, 128)):
              src = Image.open(source).convert('RGBA')
              entries = []
              for size in sizes:
                  img = src.resize((size, size), Image.LANCZOS)
                  buf = io.BytesIO()
                  img.save(buf, format='BMP')
                  # Strip the 14-byte BITMAPFILEHEADER; ICO stores raw DIB data
                  entries.append((size, buf.getvalue()[14:]))

              count = len(entries)
              header = struct.pack('<HHH', 0, 1, count)
              dir_offset = 6 + count * 16

              directory = b''
              image_data = b''
              for size, dib in entries:
                  img_offset = dir_offset + len(image_data)
                  directory += struct.pack('<BBBBHHII', size, size, 0, 0, 1, 32, len(dib), img_offset)
                  image_data += dib

              with open(dest, 'wb') as f:
                  f.write(header + directory + image_data)

          make_bmp_ico('src-tauri/icons/icon.png', 'src-tauri/icons/icon.ico')
          print('icon.ico regenerated in BMP (3.00) format')

      - name: Configure macOS signing
        if: matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE != ''
        run: |
          echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}" >> $GITHUB_ENV
          echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" >> $GITHUB_ENV
          echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> $GITHUB_ENV
          echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
          echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> $GITHUB_ENV
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple signing env vars are exported by the previous step only when
          # APPLE_CERTIFICATE is configured as a repository secret.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Query Studio ${{ github.ref_name }}'
          releaseBody: |
            ## What's new in ${{ github.ref_name }}

            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Query.Studio_*_aarch64.dmg` |
            | macOS (Intel) | `Query.Studio_*_x64.dmg` |
            | Linux | `query-studio_*_amd64.AppImage` / `.deb` |
            | Windows | `Query.Studio_*_x64-setup.exe` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
